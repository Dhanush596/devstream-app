---
- name: Deploy DevStream App to AWS
  hosts: webserver
  become: yes
  tasks:
    - name: 1. Update APT and install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: 2. Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: 3. Pull Backend Image from Docker Hub
      shell: docker pull dhanush596/devstream-server:latest

    - name: 4. Pull Frontend Image from Docker Hub
      shell: docker pull dhanush596/devstream-client:latest

    - name: 5. Stop existing containers (if any)
      shell: docker stop backend frontend || true && docker rm backend frontend || true

    - name: 6. Run Backend Container
      shell: docker run -d --name backend -p 5000:5000 dhanush596/devstream-server:latest

    - name: 7. Run Frontend Container
      shell: docker run -d --name frontend -p 3000:3000 dhanush596/devstream-client:latest